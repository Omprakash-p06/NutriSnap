# Portion Estimation Model Configuration
# XGBoost Regressor for gram estimation

# Model type
model_type: xgboost_regressor

# XGBoost parameters
xgboost:
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  n_jobs: -1
  eval_metric: rmse

# Feature configuration
features:
  - name: area
    description: "Bounding box area in pixels"
  - name: aspect_ratio
    description: "Width / Height ratio"
  - name: relative_area
    description: "Area / Image area ratio"
  - name: width
    description: "Bounding box width in pixels"
  - name: height
    description: "Bounding box height in pixels"
  - name: center_x
    description: "Normalized center X position"
  - name: center_y
    description: "Normalized center Y position"

# Default portion sizes (grams) for fallback
default_portions:
  rice:
    small: 100
    medium: 150
    large: 200
  dal:
    small: 150
    medium: 200
    large: 250
  paneer:
    small: 50
    medium: 80
    large: 120
  roti:
    small: 30
    medium: 40
    large: 50

# Training settings
training:
  test_size: 0.2
  random_state: 42
  early_stopping_rounds: 10

# Target metrics
targets:
  mape: 20  # Maximum acceptable MAPE (%)
  mae: 30   # Maximum acceptable MAE (grams)
