version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=sqlite:///./data/nutrisnap.db
      - MODEL_PATH=/app/ml/weights/
    volumes:
      - ./backend:/app/backend
      - ./ai_engine:/app/ai_engine
      - ./data:/app/data
      - ./ml/weights:/app/ml/weights
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
